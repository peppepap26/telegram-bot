services:
  - type: web
    name: telegram-bot
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install --no-cache-dir "python-telegram-bot[webhooks]==21.3" gspread==6.0.2 google-auth==2.29.0
    startCommand: python bot.py
    envVars:
      - key: TOKEN
        sync: false
      - key: GOOGLE_CREDS_JSON
        sync: false
      - key: RENDER_URL
        sync: false
      - key: SHEET_ID
        sync: false
      - key: PAYPAL_USER
        sync: false