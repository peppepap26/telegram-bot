services:
  - type: web
    name: telegram-bot
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TOKEN
        sync: false
      - key: GOOGLE_CREDS_JSON
        sync: false
      - key: RENDER_URL
        sync: false
      - key: SHEET_ID
        sync: false
      - key: PAYPAL_USER
        sync: false